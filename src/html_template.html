<!doctype html>
<html lang=en>
<head>
    <meta charset=utf-8>
    <title>Repair options</title>
    <style>
        html {
            height: 100%;
        }

        body {
            background-color: #fdf6e3;
            color: #586e75;
            margin: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .repair-tabs {
            overflow-x: scroll;
            scrollbar-width: none;
            padding-bottom: 0.5em;
            background-color: #cb4b16;
            color: #93a1a1;
            font-family: sans-serif;
            flex: 0 0 auto;
        }

        .repair-tab {
            background-color: #002b36;
            margin: 0;
            padding: 1em;
            flex-shrink: 0;
        }

        .repair-tab.active {
            background-color: #cb4b16;
            color: #eee8d5;
        }

        .code {
            margin-left: 1em;
            overflow-x: scroll;
            flex: 1 1 auto;
            padding-bottom: 2em;
        }

        .code .tab p {
            font-family: monospace;
            font-size: 1.3em;
            text-wrap: nowrap;
            margin: 0.3em;
        }

        .repair {
            font-weight: bold;
            color: #268bd2;
        }

        .to-repair {
            font-weight: bold;
            color: #d33682;
        }
    </style>
</head>
<body>
<div class="repair-tabs">
    <div style="display: flex; flex-direction: row; flex-wrap: nowrap">
        <!-- insert tab headers here -->
    </div>
</div>
<div class="code">
    <!-- insert tabs here -->
</div>
<script>
    let current = 0;

    function show(index) {
        if (index !== current) {
            let tab = document.querySelector("#tab-" + index);
            tab.style.removeProperty("display");

            let tab_header = document.querySelector("#tab-header-" + index);
            tab_header.classList.add("active");

            let old_tab = document.querySelector('#tab-' + current);
            old_tab.style.display = 'none';

            let old_tab_header = document.querySelector("#tab-header-" + current);
            old_tab_header.classList.remove("active");
        }
        current = index;
    }
</script>
</body>
</html>
